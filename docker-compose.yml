version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: helixflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: helixflow_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
